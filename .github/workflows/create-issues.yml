            - [ ] Export \`generateStarters(bioA: string, bioB: string): Promise<string[]>\`
            - [ ] Build a prompt providing both bios and instructing Claude to return a JSON array of 3 starters
            - [ ] Parse the response and validate it contains exactly 3 strings
            - [ ] Add error handling and a fallback for malformed Claude output

            ## Acceptance Criteria
