            - [ ] Return username, bio, and created_at
            - [ ] Return 404 if the profile doesn't exist
            - [ ] Do not return the raw embedding vector

            ## Acceptance Criteria
            - Valid ID returns 200 with username, bio, created_at
            - Non-existent ID returns 404
            - Raw embedding is never included in the response`,
              },
              {
                title: 'Build matching endpoint with cosine similarity',
                labels: ['backend', 'database', 'ai-integration', 'P0-critical'],
                milestone: 'Phase 6 — Matching Engine',
                body: `## Description
            Implement \`GET /matches\` to return the top 10 most similar users based on pgvector cosine similarity.

            ## Tasks
            - [ ] Create \`api/src/routes/matches.ts\`
            - [ ] Fetch the current user's embedding from the profiles table
            - [ ] If no profile exists, return an error directing the user to onboarding
            - [ ] Run the cosine similarity query: \`1 - (embedding <=> $1::vector) AS score\`
            - [ ] Exclude the current user from results
            - [ ] Order by distance ascending, limit 10
            - [ ] Return username, bio snippet, and score rounded to 2 decimal places

            ## Acceptance Criteria
            - Returns up to 10 matches sorted by similarity (highest first)
            - Current user is excluded from their own results
            - Scores are between 0 and 1, rounded to 2 decimal places
            - User with no profile gets a clear error message
            - User with a profile but no other users in the system gets an empty array`,
              },
              {
                title: 'Create seed data script for testing matches',
                labels: ['backend', 'database', 'P1-high'],
                milestone: 'Phase 6 — Matching Engine',
                body: `## Description
            Create a script or Postman collection that registers 8–10 test users with diverse bios and generates their embeddings.

            ## Tasks
            - [ ] Write a seed script (Node.js or shell) that calls the register and profile endpoints
            - [ ] Include at least 8 diverse bios covering different interest clusters
            - [ ] Bios should include some that are obviously related (for validating scores) and some that are distinct
            - [ ] Document how to run the seed script in the README

            ## Acceptance Criteria
            - Running the script creates 8+ users with populated embeddings
            - \`GET /matches\` for any seeded user returns intuitively sensible similarity rankings
            - Script is idempotent or can be re-run after wiping the database`,
              },
              {
                title: 'Create conversation starters generation service',
