            - Malformed Claude output is caught and triggers a retry or fallback`,
              },
              {
                title: 'Build conversation starters endpoint with caching',
                labels: ['backend', 'ai-integration', 'P1-high'],
                milestone: 'Phase 7 — Conversation Starters',
                body: `## Description
            Implement \`GET /matches/:id/starters\` that checks for cached starters before calling Claude.

            ## Tasks
            - [ ] Add route to \`api/src/routes/matches.ts\`
            - [ ] Normalize the user pair by always storing the smaller UUID as \`user_a_id\`
            - [ ] Check \`conversation_starters\` table for existing entry
            - [ ] If cached, return immediately
            - [ ] If not cached, fetch both bios, call \`generateStarters\`, insert into table, return result

            ## Acceptance Criteria
            - First request generates starters and returns them
            - Second request for the same pair returns cached starters without calling Claude
            - Pair order normalization works (A→B and B→A return the same cached result)
            - Non-existent match ID returns 404`,
              },
              // Phase 8 — Frontend Auth
              {
                title: 'Initialize Next.js project with App Router and Tailwind',
                labels: ['frontend', 'P0-critical'],
                milestone: 'Phase 8 — Frontend Auth',
                body: `## Description
