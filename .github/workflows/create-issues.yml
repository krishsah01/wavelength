            - [ ] Upsert into profiles table (insert if new, update bio + embedding + updated_at if exists)
            - [ ] Store embedding as JSON-stringified array cast to \`::vector\`
            - [ ] Return the profile data (without the raw embedding)

            ## Acceptance Criteria
            - New profile creates a row in the profiles table with a valid embedding
            - Updating the bio replaces the embedding
            - Bio under 50 characters returns 400
            - Bio over 5000 characters returns 400
            - Response does not include the raw embedding vector`,
              },
              {
                title: 'Build get profile endpoint',
                labels: ['backend', 'P1-high'],
                milestone: 'Phase 5 — Profile & Embeddings',
                body: `## Description
